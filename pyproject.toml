[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "insta-save-archive"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "questionary>=2.0",
]

[project.scripts]
isa = "cli.isa:main"

[tool.setuptools.packages.find]
where = [".", "legacy"]
include = ["pipeline*", "insta_save*", "cli*"]

[tool.pytest.ini_options]
# importlib mode gives each test file a path-unique identity, preventing basename
# collisions between tests/ and legacy/tests/ (both have test_reconcile.py).
addopts = "--import-mode=importlib"
