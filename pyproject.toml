[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "insta-save-archive"
version = "0.1.0"
requires-python = ">=3.12"

[project.scripts]
isa = "cli.isa:main"

[tool.setuptools.packages.find]
where = [".", "legacy"]
include = ["pipeline*", "insta_save*", "cli*"]
